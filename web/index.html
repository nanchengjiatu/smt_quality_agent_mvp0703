<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>锡膏印刷多锡/少锡质量管理 Agent</title>
  <link rel="stylesheet" href="./styles.css?v=20260706h">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>锡膏印刷多锡/少锡质量管理 Agent</h1>
      <p id="dataStatus">加载数据中...</p>
    </div>
    <div class="header-actions">
      <span id="liveBadge" class="live-badge" title="实时监听状态">● 连接中</span>
      <button id="rulesButton" class="header-link-button" title="失效机理手册与知识库维护视图">机理手册</button>
      <button id="llmButton" class="header-link-button" title="LLM 问答配置">LLM</button>
      <button id="datasourceButton" class="icon-button" title="数据库连接" aria-label="数据库连接">⚙</button>
      <button id="refreshButton" class="icon-button" title="刷新数据" aria-label="刷新数据">↻</button>
    </div>
  </header>

  <main>
    <section class="metrics" id="metrics"></section>
    <div class="metrics-footnote" id="metricsFootnote"></div>

    <nav class="tabs" aria-label="主视图">
      <button class="tab active" data-view="abnormal">实时异常</button>
      <button class="tab" data-view="warning">事前预警</button>
      <button class="tab" data-view="cases">质量案例</button>
      <button class="tab" data-view="dashboard">统计看板</button>
      <button class="tab" data-view="events">事件与根因分析</button>
      <button class="tab" data-view="rules">机理手册</button>
    </nav>

    <section class="toolbar">
      <label>
        异常类型
        <select id="defectFilter">
          <option value="">全部</option>
          <option value="少锡">少锡</option>
          <option value="多锡">多锡</option>
        </select>
      </label>
      <label>
        风险
        <select id="riskFilter">
          <option value="">全部</option>
          <option value="高">高</option>
          <option value="中">中</option>
          <option value="低">低</option>
        </select>
      </label>
      <label>
        搜索
        <input id="searchInput" type="search" placeholder="工单 / PCB / 元件 / Pad">
      </label>
    </section>

    <section id="viewRoot" class="view-root"></section>
  </main>

  <script src="./drilldown.js?v=20260706e"></script>
  <script src="./app.js?v=20260706h"></script>
</body>
</html>
